# System2 Configuration
# This file contains all System2 settings including API keys.
# Permissions: 0600 (owner read/write only).
#
# LLM provider keys are configured during onboarding (system2 onboard).
# To edit manually, uncomment and fill in the sections below.

# [llm]
# primary = "anthropic"
# fallback = ["google", "openai"]
#
# [llm.anthropic]
# keys = [
#   { key = "sk-ant-...", label = "default" },
# ]
#
# [llm.google]
# keys = [
#   { key = "AIza...", label = "default" },
# ]
#
# [llm.openai]
# keys = [
#   { key = "sk-...", label = "default" },
# ]

# [services.brave_search]
# key = "BSA..."

# [tools.web_search]
# enabled = true
# max_results = 5

[backup]
# Hours between automatic backups (minimum: 1)
cooldown_hours = 24

# Maximum number of automatic backups to keep
max_backups = 3

[knowledge]
# Maximum characters per knowledge file before truncation by the agent loader.
# The Narrator will condense files that exceed this budget during its next memory-update run.
# Approximate token equivalent: budget_chars / 4 (e.g. 20000 chars ≈ 5000 tokens).
# budget_chars = 20000

# External database connections for the query_database tool.
# Each [databases.<name>] section defines a named connection.
# Required fields: type, database. All other fields are optional.
#
# [databases.analytics]
# type = "postgres"
# host = "localhost"
# port = 5432
# database = "analytics"
# user = "readonly"
# ssl = false
# query_timeout = 30
# max_rows = 1000
#
# [databases.app]
# type = "mysql"
# host = "db.example.com"
# port = 3306
# database = "myapp"
# user = "reader"
# ssl = true
#
# [databases.local]
# type = "sqlite"
# database = "/path/to/data.db"
#
# [databases.sqlserver]
# type = "mssql"
# host = "sql.example.com"
# port = 1433
# database = "reporting"
# user = "reader"
# ssl = true
#
# [databases.clickhouse]
# type = "clickhouse"
# host = "clickhouse.example.com"
# port = 8123
# database = "analytics"
# user = "default"
#
# [databases.duckfiles]
# type = "duckdb"
# database = "/path/to/data.duckdb"
#
# [databases.snowflake_wh]
# type = "snowflake"
# account = "xy12345.us-east-1"
# database = "ANALYTICS"
# warehouse = "COMPUTE_WH"
# user = "analyst"
# role = "ANALYST"
# schema = "PUBLIC"
#
# [databases.bq_analytics]
# type = "bigquery"
# project = "my-project-123"
# database = "my_dataset"
# credentials_file = "/path/to/service-account.json"

# Per-agent overrides for model, thinking level, and compaction depth.
# These take precedence over the defaults in each agent's library frontmatter.
# Supported roles: guide, conductor, reviewer, narrator, worker
#
# [agents.conductor]
# thinking_level = "high"        # off | minimal | low | medium | high
# compaction_depth = 8           # keep N auto-compactions in sliding window
#
# [agents.conductor.models]
# anthropic = "claude-opus-4-6"  # override model for a specific provider
# google = "gemini-2.5-pro"
#
# [agents.guide]
# thinking_level = "high"
#
# [agents.guide.models]
# anthropic = "claude-opus-4-6"

[session]
# Session file size threshold for rotation in MB
rotation_threshold_mb = 10

[logs]
# Log file size threshold for rotation in MB
rotation_threshold_mb = 10

# Maximum number of archived log files to keep
max_archives = 5
